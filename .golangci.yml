version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - durationcheck
    - errcheck
    - errorlint
    - forcetypeassert
    - gosec
    - misspell
    - nilerr
    - noctx
    - nolintlint
    - staticcheck
    - unconvert
    - whitespace
  settings:
    govet:
      enable:
        - shadow
    gosec:
      # These tool-specific patterns are intentional and were reviewed:
      excludes:
        - G107 # download URL is built from a fontname.Validate'd family/release
        - G204 # fc-cache is run via exec args (no shell), with a fixed binary
        - G304 # extraction/temp paths are validated or created by us
        - G306 # font files are world-readable (0o644) on purpose
  exclusions:
    generated: lax
    paths:
      - ^\.agents/
      - ^bin/
      - ^dist/

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - ^\.agents/
      - ^bin/
      - ^dist/
