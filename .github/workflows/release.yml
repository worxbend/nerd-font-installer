name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release classification.
        required: true
        type: choice
        default: stable
        options:
          - stable
          - prerelease
      version:
        description: Optional explicit version, for example v1.2.3 or v1.2.3-rc.1.
        required: false
        type: string
      increment:
        description: Version part to increment when version is empty.
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      prerelease_identifier:
        description: Identifier used for computed prerelease versions.
        required: false
        type: string
        default: rc
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Resolve manual release version
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          INPUT_RELEASE_TYPE: ${{ inputs.release_type }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_INCREMENT: ${{ inputs.increment }}
          INPUT_PRERELEASE_IDENTIFIER: ${{ inputs.prerelease_identifier }}
        run: |
          set -euo pipefail

          normalize_version() {
            local raw="${1}"
            raw="${raw#"${raw%%[![:space:]]*}"}"
            raw="${raw%"${raw##*[![:space:]]}"}"

            if [[ -z "${raw}" ]]; then
              return 1
            fi

            if [[ "${raw}" != v* ]]; then
              raw="v${raw}"
            fi

            if [[ ! "${raw}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
              echo "Invalid version '${1}'. Use semver like v1.2.3 or v1.2.3-rc.1." >&2
              return 1
            fi

            printf "%s\n" "${raw}"
          }

          latest_stable="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n 1 \
            || true)"

          if [[ -n "${INPUT_VERSION}" ]]; then
            release_tag="$(normalize_version "${INPUT_VERSION}")"
          else
            base="${latest_stable:-v0.0.0}"
            version="${base#v}"
            IFS=. read -r major minor patch <<< "${version}"

            case "${INPUT_INCREMENT}" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
              *)
                echo "Unsupported increment '${INPUT_INCREMENT}'." >&2
                exit 1
                ;;
            esac

            release_tag="v${major}.${minor}.${patch}"

            if [[ "${INPUT_RELEASE_TYPE}" == "prerelease" ]]; then
              identifier="${INPUT_PRERELEASE_IDENTIFIER:-rc}"
              if [[ ! "${identifier}" =~ ^[0-9A-Za-z][0-9A-Za-z.-]*$ ]]; then
                echo "Invalid prerelease identifier '${identifier}'." >&2
                exit 1
              fi

              latest_prerelease="$(git tag -l "${release_tag}-${identifier}.*" \
                | grep -E "^${release_tag}-${identifier}\.[0-9]+$" \
                | sort -V \
                | tail -n 1 \
                || true)"
              next_prerelease_number=1
              if [[ -n "${latest_prerelease}" ]]; then
                next_prerelease_number="${latest_prerelease##*.}"
                next_prerelease_number=$((next_prerelease_number + 1))
              fi
              release_tag="${release_tag}-${identifier}.${next_prerelease_number}"
            fi
          fi

          if [[ "${INPUT_RELEASE_TYPE}" == "stable" && "${release_tag}" == *-* ]]; then
            echo "Stable releases cannot use prerelease versions like '${release_tag}'." >&2
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
            echo "Tag '${release_tag}' already exists." >&2
            exit 1
          fi

          {
            echo "release_tag=${release_tag}"
            echo "version=${release_tag}"
            echo "manual_prerelease=$([[ "${INPUT_RELEASE_TYPE}" == "prerelease" ]] && echo true || echo false)"
          } >> "${GITHUB_ENV}"
          echo "Resolved manual release tag: ${release_tag}"

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          version="${version:-${GITHUB_REF_NAME}}"
          release_tag="${release_tag:-${GITHUB_REF_NAME}}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" && "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]]; then
            version="latest"
            release_tag="latest"
          fi

          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          commit="${GITHUB_SHA}"
          platforms=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
          )

          rm -rf dist
          mkdir -p dist

          for platform in "${platforms[@]}"; do
            read -r goos goarch <<< "${platform}"
            archive="nerdfont-install_${version}_${goos}_${goarch}"
            staging="dist/${archive}"

            mkdir -p "${staging}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${version} -X main.commit=${commit} -X main.date=${date}" \
              -o "${staging}/nerdfont-install" \
              ./cmd/nerdfont-install

            cp README.md config.example.yaml "${staging}/"
            tar -C dist -czf "dist/${archive}.tar.gz" "${archive}"
            rm -rf "${staging}"
          done

          cd dist
          sha256sum ./*.tar.gz > checksums.txt
          echo "release_tag=${release_tag}" >> "${GITHUB_ENV}"
          echo "version=${version}" >> "${GITHUB_ENV}"

      - name: Publish manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          notes="Manual release from ${GITHUB_SHA}."
          prerelease_args=()
          latest_args=(--latest)
          if [[ "${manual_prerelease}" == "true" ]]; then
            prerelease_args=(--prerelease)
            latest_args=(--latest=false)
          fi

          gh release create "${release_tag}" dist/* \
            --target "${GITHUB_SHA}" \
            --title "${release_tag}" \
            --notes "${notes}" \
            "${prerelease_args[@]}" \
            "${latest_args[@]}"

      - name: Publish tagged release
        if: github.ref_type == 'tag' && github.event_name != 'workflow_dispatch'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${release_tag}" dist/* \
            --verify-tag \
            --generate-notes \
            --latest

      - name: Publish latest release
        if: github.ref_type != 'tag' && github.event_name != 'workflow_dispatch'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest dist/* \
            --target "${GITHUB_SHA}" \
            --title "Latest build" \
            --notes "Automated latest build from ${GITHUB_SHA}." \
            --prerelease \
            --latest=false
